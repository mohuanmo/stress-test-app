# GitHub Actions 编译工作流 — 压力检测工具
#
# 触发条件：
#   - push 到 main 分支
#   - 手动触发 (workflow_dispatch)
#
# actions 版本说明（基于2026年5月搜索结果）：
#   actions/checkout@v4 — 2024年发布的最新主版本
#   actions/setup-java@v4 — 2024年发布的最新主版本
#   actions/upload-artifact@v4 — 2024年发布的最新主版本
#   注：搜索结果确认 v4 系列为当前最新稳定版，无 v5 版本发布

name: Build Stress Test APK

# 并发控制 — 相同分支的后续运行会取消正在进行的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '编译类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# 30分钟超时
env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 步骤 1: 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2: 配置 JDK 21（与本地开发环境一致）
      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 步骤 3: 设置 Gradle Wrapper 可执行权限
      - name: 设置 Gradle Wrapper 权限
        run: chmod +x gradlew

      # 步骤 4: 编译 Debug APK
      - name: 编译 Debug APK
        if: env.BUILD_TYPE == 'debug'
        run: ./gradlew assembleDebug --build-cache --no-daemon

      # 步骤 5: 编译 Release APK（需要签名配置）
      - name: 编译 Release APK
        if: env.BUILD_TYPE == 'release'
        run: ./gradlew assembleRelease --build-cache --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 步骤 6: 上传 APK 产物
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-apk-${{ env.BUILD_TYPE }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
